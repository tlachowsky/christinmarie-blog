name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so pin-new-posts.js can commit and push

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --dir=. --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Pin new posts to Pinterest
        run: node pin-new-posts.js
        env:
          PINTEREST_ACCESS_TOKEN:  ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_CLIENT_ID:     ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_CLIENT_SECRET: ${{ secrets.PINTEREST_CLIENT_SECRET }}
          GH_TOKEN:                ${{ secrets.GH_TOKEN }}
